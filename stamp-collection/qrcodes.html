<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="description" content="Генерация QR-кодов для почтовых марок - печать наклеек, экспорт, массовая генерация">
    <meta name="theme-color" content="#1e3c72">
    <title>QR-коды для марок - StampCollection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <a href="index.html">📮 Мои марки</a>
            <a href="public_gallery.html">🌍 Публичные</a>
            <a href="add_stamp.html">➕ Добавить</a>
            <a href="reports.html">📊 Отчёты</a>
            <a href="calculator.html">💰 Калькулятор</a>
            <a href="qrcodes.html" style="background: rgba(255,255,255,0.2);">📱 QR-коды</a>
            <a href="marketplace.html">🛒 Маркетплейс</a>
        </div>
        <div class="nav-right">
            <span class="user-info">Загрузка...</span>
        </div>
    </div>
    
    <div class="container">
        <div class="qr-header">
            <h1>📱 QR-коды для марок</h1>
            <p>Создайте QR-коды для ваших марок, наклейте в альбом и быстро находите марки в приложении</p>
        </div>
        
        <div class="card">
            <!-- Панель управления -->
            <div class="batch-actions">
                <button onclick="selectAll()" style="background: #17a2b8;">✅ Выбрать все</button>
                <button onclick="deselectAll()" style="background: #6c757d;">⬜ Снять все</button>
                <button onclick="generateSelectedQR()" style="background: #28a745;">🔄 Сгенерировать выбранные</button>
                <button onclick="downloadSelectedZIP()" style="background: #fd7e14;">📥 Скачать выбранные (ZIP)</button>
                <button onclick="printSelected()" style="background: #dc3545;">🖨️ Печать выбранных</button>
            </div>
            
            <!-- Настройки QR -->
            <div class="qr-controls">
                <select id="qrSize">
                    <option value="100">Маленький (100px)</option>
                    <option value="150" selected>Средний (150px)</option>
                    <option value="200">Большой (200px)</option>
                    <option value="250">Очень большой (250px)</option>
                </select>
                <select id="qrColor">
                    <option value="#000000">Чёрный</option>
                    <option value="#2a5298">Синий</option>
                    <option value="#28a745">Зелёный</option>
                    <option value="#dc3545">Красный</option>
                    <option value="#fd7e14">Оранжевый</option>
                </select>
                <label class="size-option">
                    <input type="checkbox" id="showLabels" checked> Показывать название марки
                </label>
                <label class="size-option">
                    <input type="checkbox" id="showDetails"> Показывать детали
                </label>
            </div>
            
            <!-- Поиск -->
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="🔍 Поиск марок для генерации QR-кодов...">
                <select id="countryFilter" style="width: auto; margin-left: 0.5rem;">
                    <option value="">Все страны</option>
                </select>
            </div>
            
            <!-- Прогресс-бар -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            
            <!-- Сетка QR-кодов -->
            <div id="qrGrid" class="qr-grid">
                <div class="loading">Загрузка марок...</div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script>
        let allStamps = [];
        let selectedStamps = new Set();
        let qrInstances = new Map();
        let currentFilters = { search: '', country: '' };
        
        async function loadStampsForQR() {
            await requireAuth();
            await updateNavbar();
            
            const result = await apiRequest('list', 'GET', {});
            if (result.success) {
                allStamps = result.data;
                populateCountryFilter();
                applyFilters();
            }
        }
        
        function populateCountryFilter() {
            const countries = [...new Set(allStamps.map(s => s.country))];
            const select = document.getElementById('countryFilter');
            select.innerHTML = '<option value="">🌍 Все страны</option>' + 
                countries.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const country = document.getElementById('countryFilter').value;
            
            currentFilters = { search, country };
            
            let filtered = allStamps.filter(stamp => {
                if (search && !stamp.country.toLowerCase().includes(search) && 
                    !(stamp.description && stamp.description.toLowerCase().includes(search))) {
                    return false;
                }
                if (country && stamp.country !== country) return false;
                return true;
            });
            
            displayQRs(filtered);
        }
        
        function displayQRs(stamps) {
            const grid = document.getElementById('qrGrid');
            const size = parseInt(document.getElementById('qrSize').value);
            const color = document.getElementById('qrColor').value;
            const showLabels = document.getElementById('showLabels').checked;
            const showDetails = document.getElementById('showDetails').checked;
            const baseUrl = window.location.origin;
            
            if (stamps.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="text-align:center; padding:3rem;"><div class="icon">📭</div><h3>Нет марок для генерации</h3><p>Добавьте марки в коллекцию, чтобы создать QR-коды</p></div>';
                return;
            }
            
            grid.innerHTML = stamps.map(stamp => `
                <div class="qr-card" data-stamp-id="${stamp.id}">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <input type="checkbox" class="stamp-select" data-id="${stamp.id}" ${selectedStamps.has(stamp.id) ? 'checked' : ''} onchange="toggleSelect(${stamp.id})">
                        <span class="stamp-title">${escapeHtml(stamp.country)} (${stamp.year})</span>
                    </div>
                    ${showDetails ? `<div class="stamp-details">${escapeHtml(stamp.denomination)} | ${stamp.condition || '—'}</div>` : ''}
                    <div class="qr-code" id="qr-${stamp.id}"></div>
                    ${showLabels ? `<div style="font-size: 0.7rem; word-break: break-all; margin-top: 0.5rem;">${stamp.country} ${stamp.year}</div>` : ''}
                    <div class="qr-actions">
                        <button onclick="downloadSingleQR(${stamp.id})" title="Скачать PNG">📥</button>
                        <button onclick="printSingleQR(${stamp.id})" title="Печать">🖨️</button>
                        <button onclick="copyQRToClipboard(${stamp.id})" title="Копировать">📋</button>
                    </div>
                </div>
            `).join('');
            
            // Генерация QR-кодов для каждой марки
            stamps.forEach(stamp => {
                const url = `${baseUrl}/edit_stamp.html?id=${stamp.id}`;
                const container = document.getElementById(`qr-${stamp.id}`);
                if (container) {
                    container.innerHTML = '';
                    try {
                        const qr = new QRCode(container, {
                            text: url,
                            width: size,
                            height: size,
                            colorDark: color,
                            colorLight: "#ffffff",
                            correctLevel: QRCode.CorrectLevel.H
                        });
                        qrInstances.set(stamp.id, qr);
                    } catch(e) {
                        container.innerHTML = '<div style="color:red;">Ошибка генерации</div>';
                    }
                }
            });
        }
        
        function toggleSelect(id) {
            if (selectedStamps.has(id)) {
                selectedStamps.delete(id);
            } else {
                selectedStamps.add(id);
            }
            updateSelectAllCheckbox();
        }
        
        function selectAll() {
            const visibleStamps = getVisibleStamps();
            visibleStamps.forEach(stamp => selectedStamps.add(stamp.id));
            updateCheckboxes();
        }
        
        function deselectAll() {
            selectedStamps.clear();
            updateCheckboxes();
        }
        
        function getVisibleStamps() {
            const search = currentFilters.search;
            const country = currentFilters.country;
            return allStamps.filter(stamp => {
                if (search && !stamp.country.toLowerCase().includes(search)) return false;
                if (country && stamp.country !== country) return false;
                return true;
            });
        }
        
        function updateCheckboxes() {
            document.querySelectorAll('.stamp-select').forEach(cb => {
                cb.checked = selectedStamps.has(parseInt(cb.dataset.id));
            });
        }
        
        function updateSelectAllCheckbox() {
            const visibleStamps = getVisibleStamps();
            const allSelected = visibleStamps.length > 0 && visibleStamps.every(s => selectedStamps.has(s.id));
            // Можно добавить индикатор "выбраны все"
        }
        
        async function generateSelectedQR() {
            const toGenerate = selectedStamps.size > 0 ? Array.from(selectedStamps) : getVisibleStamps().map(s => s.id);
            if (toGenerate.length === 0) {
                showToast('Выберите хотя бы одну марку', true);
                return;
            }
            
            showToast(`Генерация ${toGenerate.length} QR-кодов...`);
            // QR-коды уже сгенерированы при отображении
            showToast(`✅ Готово! ${toGenerate.length} QR-кодов доступны для скачивания`);
        }
        
        async function downloadSelectedZIP() {
            const toDownload = selectedStamps.size > 0 ? Array.from(selectedStamps) : getVisibleStamps().map(s => s.id);
            if (toDownload.length === 0) {
                showToast('Выберите хотя бы одну марку', true);
                return;
            }
            
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            progressBar.style.display = 'block';
            
            const zip = new JSZip();
            const size = parseInt(document.getElementById('qrSize').value);
            const color = document.getElementById('qrColor').value;
            const baseUrl = window.location.origin;
            
            for (let i = 0; i < toDownload.length; i++) {
                const stampId = toDownload[i];
                const stamp = allStamps.find(s => s.id === stampId);
                if (!stamp) continue;
                
                progressFill.style.width = `${((i + 1) / toDownload.length) * 100}%`;
                
                const url = `${baseUrl}/edit_stamp.html?id=${stampId}`;
                const qrCanvas = await generateQRCanvas(url, size, color);
                const dataUrl = qrCanvas.toDataURL('image/png');
                const base64Data = dataUrl.split(',')[1];
                const filename = `${stamp.country}_${stamp.year}_${stamp.denomination.replace(/[^a-zA-Z0-9]/g, '_')}.png`;
                zip.file(filename, base64Data, { base64: true });
            }
            
            const content = await zip.generateAsync({ type: 'blob' });
            saveAs(content, `stamps_qr_${new Date().toISOString().slice(0,19)}.zip`);
            progressBar.style.display = 'none';
            showToast(`✅ ZIP архив сохранен (${toDownload.length} файлов)`);
        }
        
        function generateQRCanvas(text, size, color) {
            return new Promise((resolve) => {
                const tempDiv = document.createElement('div');
                const qr = new QRCode(tempDiv, {
                    text: text,
                    width: size,
                    height: size,
                    colorDark: color,
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
                setTimeout(() => {
                    const canvas = tempDiv.querySelector('canvas');
                    resolve(canvas || document.createElement('canvas'));
                }, 100);
            });
        }
        
        function downloadSingleQR(stampId) {
            const stamp = allStamps.find(s => s.id === stampId);
            if (!stamp) return;
            
            const qrContainer = document.getElementById(`qr-${stampId}`);
            const canvas = qrContainer?.querySelector('canvas');
            if (canvas) {
                const link = document.createElement('a');
                link.download = `${stamp.country}_${stamp.year}_QR.png`;
                link.href = canvas.toDataURL();
                link.click();
                showToast(`Скачан QR-код для ${stamp.country}`);
            } else {
                showToast('Ошибка: QR-код не найден', true);
            }
        }
        
        function printSingleQR(stampId) {
            const stamp = allStamps.find(s => s.id === stampId);
            if (!stamp) return;
            
            const qrContainer = document.getElementById(`qr-${stampId}`);
            const canvas = qrContainer?.querySelector('canvas');
            if (canvas) {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                    <head>
                        <title>QR-код - ${stamp.country} ${stamp.year}</title>
                        <style>
                            body { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: Arial; margin: 0; }
                            .container { text-align: center; padding: 20px; }
                            img { max-width: 200px; margin: 20px; }
                            .info { margin-top: 20px; }
                            @media print {
                                body { margin: 0; padding: 0; }
                            }
                        </style>
                    </head>
                    <body>
                        <div class="container">
                            <img src="${canvas.toDataURL()}">
                            <div class="info">
                                <strong>${stamp.country} (${stamp.year})</strong><br>
                                ${stamp.denomination}<br>
                                ${stamp.condition || ''}
                            </div>
                        </div>
                    </body>
                    </html>
                `);
                printWindow.print();
                printWindow.close();
            }
        }
        
        async function copyQRToClipboard(stampId) {
            const qrContainer = document.getElementById(`qr-${stampId}`);
            const canvas = qrContainer?.querySelector('canvas');
            if (canvas) {
                canvas.toBlob(async (blob) => {
                    await navigator.clipboard.write([
                        new ClipboardItem({
                            [blob.type]: blob
                        })
                    ]);
                    showToast('QR-код скопирован в буфер обмена');
                });
            }
        }
        
        function printSelected() {
            const toPrint = selectedStamps.size > 0 ? Array.from(selectedStamps) : getVisibleStamps().map(s => s.id);
            if (toPrint.length === 0) {
                showToast('Выберите хотя бы одну марку для печати', true);
                return;
            }
            
            const printWindow = window.open('', '_blank');
            const size = parseInt(document.getElementById('qrSize').value);
            const showLabels = document.getElementById('showLabels').checked;
            const showDetails = document.getElementById('showDetails').checked;
            
            let html = `
                <html>
                <head>
                    <title>QR-коды для марок</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 20px; }
                        .qr-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
                        .qr-card { text-align: center; break-inside: avoid; page-break-inside: avoid; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
                        .qr-card img { max-width: 150px; height: auto; }
                        .stamp-title { font-weight: bold; margin: 10px 0 5px; }
                        .stamp-details { font-size: 12px; color: #666; }
                        @media print {
                            .qr-grid { grid-template-columns: repeat(4, 1fr); }
                            .qr-card { border: none; }
                        }
                    </style>
                </head>
                <body>
                    <h1>QR-коды для альбома</h1>
                    <p>Дата: ${new Date().toLocaleString()}</p>
                    <div class="qr-grid">
            `;
            
            for (const stampId of toPrint) {
                const stamp = allStamps.find(s => s.id === stampId);
                if (!stamp) continue;
                
                const url = `${window.location.origin}/edit_stamp.html?id=${stampId}`;
                const qrCanvas = await generateQRCanvas(url, size, '#000000');
                const imgData = qrCanvas.toDataURL();
                
                html += `
                    <div class="qr-card">
                        <img src="${imgData}">
                        ${showLabels ? `<div class="stamp-title">${stamp.country} (${stamp.year})</div>` : ''}
                        ${showDetails ? `<div class="stamp-details">${stamp.denomination} | ${stamp.condition || '—'}</div>` : ''}
                    </div>
                `;
            }
            
            html += `
                    </div>
                </body>
                </html>
            `;
            
            printWindow.document.write(html);
            printWindow.document.close();
            printWindow.print();
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обработчики событий
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('countryFilter').addEventListener('change', applyFilters);
        document.getElementById('qrSize').addEventListener('change', () => displayQRs(getVisibleStamps()));
        document.getElementById('qrColor').addEventListener('change', () => displayQRs(getVisibleStamps()));
        document.getElementById('showLabels').addEventListener('change', () => displayQRs(getVisibleStamps()));
        document.getElementById('showDetails').addEventListener('change', () => displayQRs(getVisibleStamps()));
        
        // Загрузка
        loadStampsForQR();
    </script>
</body>
</html>
