<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <meta name="description" content="Публичные коллекции почтовых марок других коллекционеров">
    <meta name="theme-color" content="#1e3c72">
    <title>Публичные коллекции - StampCollection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192x192.png">
</head>
<body>
    <div class="navbar">
        <div class="nav-left">
            <a href="index.html">📮 Мои марки</a>
            <a href="public_gallery.html" style="background: rgba(255,255,255,0.2);">🌍 Публичные</a>
            <a href="add_stamp.html">➕ Добавить</a>
            <a href="reports.html">📊 Отчёты</a>
            <a href="calculator.html">💰 Калькулятор</a>
            <a href="marketplace.html">🛒 Маркетплейс</a>
        </div>
        <div class="nav-right">
            <span class="user-info">Загрузка...</span>
        </div>
    </div>
    
    <div class="container">
        <div class="gallery-header">
            <h1>🌍 Публичные коллекции</h1>
            <p>Изучайте коллекции других филателистов, находите вдохновение и обменивайтесь опытом</p>
            <div class="stats-banner" id="globalStats">
                <div class="stat-item"><div class="stat-number" id="totalCollectors">0</div><div>коллекционеров</div></div>
                <div class="stat-item"><div class="stat-number" id="totalPublicStamps">0</div><div>публичных марок</div></div>
                <div class="stat-item"><div class="stat-number" id="totalCountries">0</div><div>стран</div></div>
            </div>
        </div>
        
        <div class="search-section">
            <div class="filters-row">
                <input type="text" id="searchInput" placeholder="🔍 Поиск по стране, описанию, номиналу...">
                <select id="countryFilter">
                    <option value="">🌍 Все страны</option>
                </select>
                <select id="sortBy">
                    <option value="newest">📅 Сначала новые</option>
                    <option value="oldest">📅 Сначала старые</option>
                    <option value="country">🌍 По стране</option>
                    <option value="value">💰 По стоимости</option>
                </select>
            </div>
            <div class="filters-row">
                <input type="number" id="yearFrom" placeholder="Год от">
                <input type="number" id="yearTo" placeholder="Год до">
                <input type="text" id="tagFilter" placeholder="🏷️ Фильтр по тегу">
                <button onclick="searchPublicStamps()">🔍 Найти</button>
                <button onclick="resetFilters()" style="background: #6c757d;">🗑️ Сбросить</button>
            </div>
        </div>
        
        <!-- Список коллекционеров -->
        <div class="users-list" id="usersList"></div>
        
        <!-- Информация о выбранной коллекции -->
        <div id="collectionInfo" class="collection-stats" style="display: none;"></div>
        
        <!-- Сетка марок -->
        <div id="stampsGrid" class="grid-list">
            <div class="loading">Загрузка публичных коллекций...</div>
        </div>
    </div>
    
    <!-- Модальное окно просмотра марки -->
    <div id="stampModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; overflow-y:auto;">
        <div style="background:white; min-height:100vh; margin:0; padding:20px; position:relative;">
            <button onclick="closeModal()" style="position:sticky; top:10px; float:right; background:#dc3545; border:none; border-radius:50%; width:40px; height:40px; font-size:20px; cursor:pointer;">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
    <script src="auth.js"></script>
    <script>
        let allPublicStamps = [];
        let filteredStamps = [];
        let collectors = [];
        let selectedCollector = null;
        
        // Загрузка публичных коллекций
        async function loadPublicGallery() {
            const user = await requireAuth();
            if (!user) return;
            await updateNavbar();
            
            const result = await apiRequest('list', 'GET', { public_only: 'true' });
            if (result.success) {
                allPublicStamps = result.data;
                filteredStamps = [...allPublicStamps];
                updateGlobalStats();
                buildCollectorsList();
                displayStamps(filteredStamps);
                populateCountryFilter();
            }
        }
        
        // Обновление глобальной статистики
        function updateGlobalStats() {
            const uniqueCollectors = [...new Set(allPublicStamps.map(s => s.username))];
            const uniqueCountries = [...new Set(allPublicStamps.map(s => s.country))];
            
            document.getElementById('totalCollectors').innerHTML = uniqueCollectors.length;
            document.getElementById('totalPublicStamps').innerHTML = allPublicStamps.length;
            document.getElementById('totalCountries').innerHTML = uniqueCountries.length;
        }
        
        // Построение списка коллекционеров
        function buildCollectorsList() {
            const collectorsMap = {};
            allPublicStamps.forEach(s => {
                if (!collectorsMap[s.username]) {
                    collectorsMap[s.username] = {
                        username: s.username,
                        count: 0,
                        totalValue: 0
                    };
                }
                collectorsMap[s.username].count++;
                collectorsMap[s.username].totalValue += parseFloat(s.estimated_price) || 0;
            });
            
            collectors = Object.values(collectorsMap).sort((a,b) => b.count - a.count);
            
            const usersListDiv = document.getElementById('usersList');
            usersListDiv.innerHTML = `
                <div class="user-chip ${!selectedCollector ? 'active' : ''}" onclick="selectCollector(null)">
                    🌍 Все коллекции <span class="stamp-count">(${allPublicStamps.length})</span>
                </div>
                ${collectors.map(c => `
                    <div class="user-chip ${selectedCollector === c.username ? 'active' : ''}" onclick="selectCollector('${c.username}')">
                        👤 ${c.username} <span class="stamp-count">(${c.count})</span>
                    </div>
                `).join('')}
            `;
        }
        
        // Выбор коллекционера
        function selectCollector(username) {
            selectedCollector = username;
            buildCollectorsList();
            applyFilters();
        }
        
        // Заполнение фильтра стран
        function populateCountryFilter() {
            const countries = [...new Set(allPublicStamps.map(s => s.country))];
            const select = document.getElementById('countryFilter');
            select.innerHTML = '<option value="">🌍 Все страны</option>' + 
                countries.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        
        // Поиск и фильтрация
        function searchPublicStamps() {
            applyFilters();
        }
        
        function applyFilters() {
            let filtered = [...allPublicStamps];
            
            // Фильтр по коллекционеру
            if (selectedCollector) {
                filtered = filtered.filter(s => s.username === selectedCollector);
            }
            
            // Поиск по тексту
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) {
                filtered = filtered.filter(s => 
                    s.country.toLowerCase().includes(search) ||
                    (s.description && s.description.toLowerCase().includes(search)) ||
                    s.denomination.toLowerCase().includes(search)
                );
            }
            
            // Фильтр по стране
            const country = document.getElementById('countryFilter').value;
            if (country) {
                filtered = filtered.filter(s => s.country === country);
            }
            
            // Фильтр по году
            const yearFrom = parseInt(document.getElementById('yearFrom').value);
            const yearTo = parseInt(document.getElementById('yearTo').value);
            if (yearFrom) filtered = filtered.filter(s => s.year >= yearFrom);
            if (yearTo) filtered = filtered.filter(s => s.year <= yearTo);
            
            // Фильтр по тегу
            const tag = document.getElementById('tagFilter').value.toLowerCase();
            if (tag) {
                filtered = filtered.filter(s => (s.tags || []).some(t => t.toLowerCase().includes(tag)));
            }
            
            // Сортировка
            const sortBy = document.getElementById('sortBy').value;
            switch(sortBy) {
                case 'newest':
                    filtered.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
                    break;
                case 'oldest':
                    filtered.sort((a,b) => new Date(a.created_at) - new Date(b.created_at));
                    break;
                case 'country':
                    filtered.sort((a,b) => a.country.localeCompare(b.country));
                    break;
                case 'value':
                    filtered.sort((a,b) => (parseFloat(b.estimated_price) || 0) - (parseFloat(a.estimated_price) || 0));
                    break;
            }
            
            filteredStamps = filtered;
            updateCollectionInfo();
            displayStamps(filteredStamps);
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('countryFilter').value = '';
            document.getElementById('yearFrom').value = '';
            document.getElementById('yearTo').value = '';
            document.getElementById('tagFilter').value = '';
            document.getElementById('sortBy').value = 'newest';
            applyFilters();
        }
        
        // Обновление информации о коллекции
        function updateCollectionInfo() {
            const infoDiv = document.getElementById('collectionInfo');
            if (selectedCollector) {
                const collectorStamps = allPublicStamps.filter(s => s.username === selectedCollector);
                const totalValue = collectorStamps.reduce((sum, s) => sum + (parseFloat(s.estimated_price) || 0), 0);
                const countries = [...new Set(collectorStamps.map(s => s.country))];
                const tags = [...new Set(collectorStamps.flatMap(s => s.tags || []))];
                
                infoDiv.style.display = 'flex';
                infoDiv.innerHTML = `
                    <div><strong>👤 Коллекционер:</strong> ${selectedCollector}</div>
                    <div><strong>📮 Всего марок:</strong> ${collectorStamps.length}</div>
                    <div><strong>💰 Общая стоимость:</strong> ${formatPrice(totalValue, 'USD')}</div>
                    <div><strong>🌍 Стран:</strong> ${countries.length}</div>
                    <div><strong>🏷️ Популярные теги:</strong> ${tags.slice(0, 3).join(', ') || '—'}</div>
                `;
            } else {
                infoDiv.style.display = 'none';
            }
        }
        
        // Отображение марок
        function displayStamps(stamps) {
            const grid = document.getElementById('stampsGrid');
            
            if (stamps.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📭</div>
                        <h3>Нет публичных марок</h3>
                        <p>Пока никто не опубликовал свои коллекции или марки не найдены</p>
                        <button onclick="resetFilters()" style="margin-top: 1rem;">🔄 Сбросить фильтры</button>
                    </div>
                `;
                return;
            }
            
            grid.innerHTML = stamps.map(stamp => `
                <div class="stamp-card" onclick="showStampModal(${stamp.id}, '${stamp.username}')">
                    <img src="${stamp.image_path || 'https://via.placeholder.com/280x200?text=📮'}" 
                         alt="${stamp.country}"
                         loading="lazy"
                         onerror="this.src='https://via.placeholder.com/280x200?text=📮'">
                    <div class="info">
                        <div class="owner">👤 ${stamp.username}</div>
                        <h3>${escapeHtml(stamp.country)} (${stamp.year})</h3>
                        <p><strong>💰</strong> ${escapeHtml(stamp.denomination)}</p>
                        <p><strong>⭐</strong> ${escapeHtml(stamp.condition || '—')}</p>
                        ${stamp.estimated_price ? `<div class="price-badge">${formatPrice(stamp.estimated_price, stamp.currency)}</div>` : ''}
                        ${stamp.tags && stamp.tags.length ? `<p><small>🏷️ ${stamp.tags.slice(0, 2).join(', ')}${stamp.tags.length > 2 ? '...' : ''}</small></p>` : ''}
                    </div>
                </div>
            `).join('');
        }
        
        // Показ модального окна
        function showStampModal(stampId, ownerName) {
            const stamp = allPublicStamps.find(s => s.id == stampId);
            if (!stamp) return;
            
            const modal = document.getElementById('stampModal');
            const content = document.getElementById('modalContent');
            
            content.innerHTML = `
                <img src="${stamp.image_path || 'https://via.placeholder.com/400x300?text=📮'}" 
                     style="width:100%; max-height:400px; object-fit:contain; border-radius:12px;"
                     onerror="this.src='https://via.placeholder.com/400x300?text=📮'">
                <h2>${escapeHtml(stamp.country)} (${stamp.year})</h2>
                <p><strong>👤 Коллекционер:</strong> ${stamp.username}</p>
                <p><strong>💰 Номинал:</strong> ${escapeHtml(stamp.denomination)}</p>
                <p><strong>⭐ Состояние:</strong> ${escapeHtml(stamp.condition || '—')}</p>
                ${stamp.estimated_price ? `<p><strong>💵 Оценочная стоимость:</strong> ${formatPrice(stamp.estimated_price, stamp.currency)}</p>` : ''}
                ${stamp.tags && stamp.tags.length ? `<p><strong>🏷️ Теги:</strong> ${stamp.tags.join(', ')}</p>` : ''}
                <p><strong>📝 Описание:</strong></p>
                <p>${escapeHtml(stamp.description || 'Нет описания')}</p>
                <p><small>📅 Добавлено: ${new Date(stamp.created_at).toLocaleString('ru')}</small></p>
                
                <div style="display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap;">
                    <button onclick="contactCollector('${stamp.username}')" style="flex:1; background: #17a2b8;">💬 Связаться с коллекционером</button>
                    ${stamp.estimated_price ? `<button onclick="makeOffer(${stamp.id})" style="flex:1; background: #28a745;">🛒 Предложить цену</button>` : ''}
                    <button onclick="window.location.href='marketplace.html?stamp=${stamp.id}'" style="flex:1;">🔄 Предложить обмен</button>
                </div>
            `;
            
            modal.style.display = 'block';
            document.body.style.overflow = 'hidden';
        }
        
        function closeModal() {
            document.getElementById('stampModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        // Связь с коллекционером
        function contactCollector(username) {
            showToast(`📧 Функция связи с ${username} будет доступна в следующем обновлении`, false);
        }
        
        function makeOffer(stampId) {
            showToast('💰 Функция предложения цены будет доступна в следующем обновлении', false);
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Обработчики событий
        document.getElementById('searchInput').addEventListener('keyup', applyFilters);
        document.getElementById('countryFilter').addEventListener('change', applyFilters);
        document.getElementById('yearFrom').addEventListener('change', applyFilters);
        document.getElementById('yearTo').addEventListener('change', applyFilters);
        document.getElementById('tagFilter').addEventListener('keyup', applyFilters);
        document.getElementById('sortBy').addEventListener('change', applyFilters);
        
        // Запуск
        loadPublicGallery();
    </script>
</body>
</html>
